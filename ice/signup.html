<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            margin: 30px auto;
            width: 600px;
            height: 900px;
            background-color: white;
            border: 15px solid navy;
            border-radius: 40px;
            overflow: hidden;
        }

        #myForm {
            border-radius: 40px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr 110px 1fr 1fr;
            grid-template-rows: 250px 500px 150px;
            column-gap: 5px;
            box-sizing: border-box;
        }

        #closeBtn {
            width: 35px;
            height: 30px;
            font-size: 20px;
            background-color: white;
            color: navy;
            border: 5px solid white;
            border-radius: 5px;
            text-align: center;   
        }

        .daily {
            font-size: 28px;
            text-align: center;
            margin-top: 70px;
            text-shadow: 2px 2px black;
        }

        .title {
            background-image: url("images/jesus_feeds_5000.jpeg");
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center top; 
            background-repeat: no-repeat;
            grid-column: 1/6;
            grid-row: 1/2;
            box-sizing: border-box;
            color: white;
            padding: 15px;

        }

        .titleform {
            grid-column: 1/6;
            grid-row: 2/3;
            font-size: 23px;
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 20px;
        }

        .titleform h3 {
            grid-column: 1/3;
            text-align: center;
            font-size: 28px;
        }

        .username {
            grid-column: 1/2;
        }

        #username {
            grid-column: 2/3;
            background-color: rgb(183, 183, 255);
            border: none;
            border-radius: 5px;
        }

        .password {
            grid-column: 1/2;
        }

        #password {
            grid-column: 2/3;
            background-color: rgb(183, 183, 255);
            border: none;
            border-radius: 5px;
        }

        .email {
            grid-column: 1/2;
        }

        #email {
            grid-column: 2/3;
            background-color: rgb(183, 183, 255);
            border: none;
            border-radius: 5px;
        }

        .gender {
            grid-column: 1/2;
        }

        .genders {
            grid-column: 2/3;
        }

        .oldtestament {
            grid-column: 1/2;
            grid-row: 3/4;
            width: 100%;
            height: 100%;
        }

        .subscribe {
            grid-column: 1/3;
            text-align: center;
        }

        .actknowledge {
            grid-column: 1/3;
            text-align: center;
        }

        .submit {
            grid-column: 1/3;
            margin: 0 auto;
        }

        .submitbutton {
            width: 110%;
            height: 105%;
            font-size: 15px;
            background-color: navy;
            color: white;
            border: 5px solid navy;
            border-radius: 10px;
        }

        .newtestament {
            grid-column: 2/3;
            grid-row: 3/4;
            width: 100%;
            height: 100%;
        }

        .bookofmormon {
            grid-column: 3/4;
            grid-row: 3/4;
            width: 100%;
            height: 100%;
        }

        .doctrineandcovenants {
            grid-column: 4/5;
            grid-row: 3/4;
            width: 100%;
            height: 100%;
        }

        .pearlofgreatprice {
            grid-column: 5/6;
            grid-row: 3/4;
            width: 100%;
            height: 100%;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <form id="myForm">
            <div class="title">
            <button type="button" id="closeBtn">X</button>
            <div class="daily">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
            </div>
            </div>
            <div class="titleform">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <label for="username" class="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password" class="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email" class="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label class="gender">Gender:</label>
            <div class="genders">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section class="subscribe">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="actknowledge">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section class="submit">
                <button type="submit" class="submitbutton">Submit</button>
            </section>
            </div>
            <img class="oldtestament" src="images/old_testament.webp" alt="Old Testament">
            <img class="newtestament" src="images/new_testament.webp" alt="New Testament">
            <img class="bookofmormon" src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img class="doctrineandcovenants" src="images/doctrine_and_covenants.webp" alt="Dcotrine and Covenants">
            <img class="pearlofgreatprice" src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </form>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
