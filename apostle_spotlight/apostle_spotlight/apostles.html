<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background: #E8ECED;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            margin: auto;
            text-align: center;
            align-content: center;
            justify-content: center;
            }
        .card {
            background-image: url('images/christus.webp');
            background-size: 2800px;
            background-position: center;
            border: 20px solid black;
            border-radius: 100px;
            margin: 50px auto;
            text-align: center;
            align-content: center;
            width: 1800px;
            padding-bottom: 60px;
        }
        .presidency {
            display: grid;
            place-items: center;
            grid-template-columns: 1fr 1fr 1fr;
            grid-gap: 40px;
            width: 60%;
            align-items: flex-end;
            justify-content: space-between;
            margin: auto;
            text-align: center;
        }
        .apostles {
            display: grid;
            place-items: center;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-gap: 40px;
            margin: auto;
            width: 60%;
        }
        h1, h3 {
            text-align: center;
        }
        h1{
            font-size: 4em;
        }
        h3 {
            font-size: 3em;
        }
        img {
            border-radius: 50%;
            border: 18px solid white;
            width: 180px;
            height: 180px;
        }
        .oaks {
            width: 300px;
            height: 300px;
        }
        .eyring, .christofferson {
            width: 280px;
            height: 280px;
        }
        .holland:hover {
            border: 18px solid blue;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>First Presidency</h1>
        <div class="presidency">
        <img class="eyring" src="images/eyring.webp" alt="president eyring">
        <img class="oaks" src="images/oaks.webp" alt="president oaks">
        <img class="christofferson" src="images/christofferson.webp" alt="president christofferson">
        </div>
         <h3>Quorum of the Twelve Apostles</h3>
        <div class="apostles">
        <img class="holland" src="images/holland.webp" alt="elder holland">
        <img src="images/uchtdorf.webp" alt="elder uchtdorf">
        <img src="images/bednar.webp" alt="elder bednar">
        <img src="images/cook.webp" alt="elder cook">
        <img src="images/anderson.webp" alt="elder anderson">
        <img src="images/rasband.webp" alt="elder rasband">
        <img src="images/stevenson.webp" alt="elder stevenson">
        <img src="images/renlund.webp" alt="elder renlund">
        <img src="images/gong.webp" alt="elder gong">
        <img src="images/soares.webp" alt="elder soares">
        <img src="images/kearon.webp" alt="elder kearon">
        <img src="images/causse.webp" alt="elder causse">
        </div>       
    </div>
     
</body>
</html>
